<!DOCTYPE html>
<html lang="en">

<head>
    <title>Alerts — Threat Monitoring</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='alerts.css') }}">
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>
    <div class="layout">

        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-text">Network Monitoring</div>
                <div class="logo-sub">Network Defense System</div>
            </div>
            <nav class="sidebar-nav">
                <a href="{{ url_for('dashboard') }}" class="nav-item">
                    <i class="bi bi-speedometer2"></i><span>Dashboard</span>
                </a>
                <a href="{{ url_for('alert') }}" class="nav-item active">
                    <i class="bi bi-bell-fill"></i><span>Alerts</span>
                </a>
                <a href="{{ url_for('logs') }}" class="nav-item">
                    <i class="bi bi-journal-code"></i><span>Audit Logs</span>
                </a>
                <a href="{{ url_for('whitelist') }}" class="nav-item">
                    <i class="bi bi-shield-check"></i><span>Whitelist</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="avatar">{{ user[0] | upper }}</div>
                <div class="user-info">
                    <div class="user-name">{{ user }}</div>
                    <div class="user-role">Network Analyst</div>
                </div>
                <a href="{{ url_for('logout') }}" class="logout-btn" title="Logout">
                    <i class="bi bi-power"></i>
                </a>
            </div>
        </aside>

        <main class="main">
            <div class="topbar">
                <div>
                    <div class="page-title">Threat Alerts</div>
                    <div class="page-sub">DETECTED NETWORK ACTIVITY</div>
                </div>
                <div class="topbar-right">
                    <div class="live-badge"><span class="live-dot"></span>Live</div>
                    <div class="topbar-time" id="clock"></div>
                </div>
            </div>

            <div class="toolbar">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="DDoS Attack">DDoS</button>
                <button class="filter-btn" data-filter="Port Scan">Port Scan</button>
                <button class="filter-btn" data-filter="ARP Spoofing">ARP Spoofing</button>
                <div class="search-wrap">
                    <span class="search-icon">⌕</span>
                    <input class="search-input" id="searchInput" type="text" placeholder="Search IP, type, details…"
                        autocomplete="off">
                </div>
                <button class="export-btn" id="exportBtn">⬇ Export CSV</button>
            </div>
            <div class="result-count" id="resultCount"></div>

            <div id="alert-feed"></div>
            <div id="empty-state" class="empty-state" style="display:none;">
                <div class="empty-icon">🛡</div>
                <div class="empty-text">NO ACTIVE THREATS DETECTED</div>
            </div>
        </main>
    </div>

    <script>
        const POLL_INTERVAL_MS = 2000;

        let allAlerts = [];
        let activeFilter = 'all';
        let searchQuery = '';
        let lastSnapshot = '';

        const feedEl = document.getElementById('alert-feed');
        const emptyEl = document.getElementById('empty-state');
        const resultCountEl = document.getElementById('resultCount');

        /* ── Clock ── */
        function updateClock() {
            document.getElementById('clock').textContent =
                new Date().toLocaleTimeString('en-US', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        /* ── Filtering + search ── */
        function getDisplayedAlerts() {
            let list = activeFilter === 'all'
                ? allAlerts
                : allAlerts.filter(a => a.alert_type === activeFilter);

            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                list = list.filter(a =>
                    (a.source_ip && a.source_ip.toLowerCase().includes(q)) ||
                    (a.alert_type && a.alert_type.toLowerCase().includes(q)) ||
                    (a.timestamp && a.timestamp.toLowerCase().includes(q)) ||
                    (a.details && JSON.stringify(a.details).toLowerCase().includes(q))
                );
            }
            return list;
        }

        /* ── Card builders per alert type ── */
        const CARD_BUILDERS = {
            'DDoS Attack': (a, d) => ({
                typeClass: 'ddos',
                badge: `<span class="badge red">DDoS Attack</span>`,
                details: `
                    <div class="detail-row"><span class="detail-label">Source IP</span><span class="detail-value mono">${a.source_ip}</span></div>
                    <div class="detail-row"><span class="detail-label">Packets</span><span class="detail-value">${d.packets_in_window}</span></div>
                    <div class="detail-row"><span class="detail-label">Rate</span><span class="detail-value">${d.rate_per_second} pkt/s</span></div>`
            }),
            'Port Scan': (a, d) => {
                const portChips = Array.isArray(d.ports)
                    ? d.ports.map(p => `<span class="port-chip">${p}</span>`).join('')
                    : d.ports;
                return {
                    typeClass: 'portscan',
                    badge: `<span class="badge orange">Port Scan</span>`,
                    details: `
                        <div class="detail-row"><span class="detail-label">Source IP</span><span class="detail-value mono">${a.source_ip}</span></div>
                        <div class="detail-row"><span class="detail-label">Unique Ports</span><span class="detail-value">${d.unique_ports}</span></div>
                        <div class="detail-row"><span class="detail-label">Ports</span><span class="detail-value"><div class="ports-wrap">${portChips}</div></span></div>`
                };
            },
            'ARP Spoofing': (a, d) => {
                const attackerMacs = Array.isArray(d.attacker_macs) ? d.attacker_macs.join(', ') : d.attacker_macs;
                return {
                    typeClass: 'arp',
                    badge: `<span class="badge yellow">ARP Spoofing</span>`,
                    details: `
                        <div class="detail-row"><span class="detail-label">IP Address</span><span class="detail-value mono">${a.source_ip}</span></div>
                        <div class="detail-row"><span class="detail-label">Trusted MAC</span><span class="detail-value mono">${d.trusted_mac}</span></div>
                        <div class="detail-row"><span class="detail-label">Attacker MACs</span><span class="detail-value mono">${attackerMacs}</span></div>`
                };
            }
        };

        function buildCard(a) {
            const d = a.details;
            const builder = CARD_BUILDERS[a.alert_type];
            if (!builder) return '';
            const { typeClass, badge, details } = builder(a, d);

            return `
            <div class="alert-card ${typeClass}">
                <div class="alert-card-header">
                    ${badge}
                    <span class="alert-title">${a.alert_type}</span>
                    <span class="alert-time">${a.timestamp}</span>
                </div>
                <div class="alert-card-body">
                    <p class="alert-desc">${d.description}</p>
                    <div class="detail-grid">${details}</div>
                    <div class="action-box">
                        <span>💡</span>
                        <span><strong>Recommended:</strong> ${d.action}</span>
                    </div>
                </div>
            </div>`;
        }

        /* ── Render ── */
        function renderFeed() {
            const alerts = getDisplayedAlerts();
            const snapshot = JSON.stringify(alerts) + searchQuery + activeFilter;
            if (snapshot === lastSnapshot) return;
            lastSnapshot = snapshot;

            if (!alerts.length) {
                feedEl.innerHTML = '';
                emptyEl.style.display = 'block';
                resultCountEl.textContent = '';
                return;
            }

            emptyEl.style.display = 'none';
            resultCountEl.textContent = `Showing ${alerts.length} result${alerts.length !== 1 ? 's' : ''}`;
            feedEl.innerHTML = alerts.map(buildCard).join('');
        }

        /* ── CSV Export ── */
        function exportCSV() {
            const alerts = getDisplayedAlerts();
            if (!alerts.length) return;

            const summarize = (a) => {
                const d = a.details;
                switch (a.alert_type) {
                    case 'DDoS Attack':
                        return `${d.packets_in_window} pkts @ ${d.rate_per_second} pkt/s`;
                    case 'Port Scan':
                        return `${d.unique_ports} ports: ${Array.isArray(d.ports) ? d.ports.join(' ') : d.ports}`;
                    case 'ARP Spoofing':
                        return `${d.trusted_mac} -> ${Array.isArray(d.attacker_macs) ? d.attacker_macs.join(' ') : d.attacker_macs}`;
                    default:
                        return '';
                }
            };

            const header = ['Timestamp', 'Source IP', 'Alert Type', 'Details'];
            const rows = alerts.map(a =>
                [a.timestamp, a.source_ip, a.alert_type, summarize(a)]
                    .map(v => `"${String(v).replace(/"/g, '""')}"`)
                    .join(',')
            );

            const csv = [header.join(','), ...rows].join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `threatmon-alerts-${new Date().toISOString().slice(0, 10)}.csv`;
            link.click();
            URL.revokeObjectURL(url);
        }

        /* ── Event listeners ── */
        document.getElementById('searchInput').addEventListener('input', function () {
            searchQuery = this.value.trim();
            lastSnapshot = '';
            renderFeed();
        });

        document.getElementById('exportBtn').addEventListener('click', exportCSV);

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeFilter = btn.dataset.filter;
                lastSnapshot = '';
                renderFeed();
            });
        });

        /* ── Polling ── */
        async function fetchAlerts() {
            try {
                const res = await fetch('/api/alerts');
                const data = await res.json();
                allAlerts = data.alerts || [];
                renderFeed();
            } catch (err) {
                console.error('Failed to fetch alerts:', err);
            }
        }

        fetchAlerts();
        setInterval(fetchAlerts, POLL_INTERVAL_MS);
    </script>
</body>

</html>
